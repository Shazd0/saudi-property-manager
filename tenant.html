<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="theme-color" content="#4f46e5" />
    <title>Amlak Tenant Portal - بوابة المستأجر</title>
    <script>
      const _origWarn = console.warn;
      console.warn = function(...args) {
        if (args[0] && typeof args[0] === 'string' && args[0].includes('cdn.tailwindcss.com')) return;
        _origWarn.apply(console, args);
      };
    </script>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&family=Tajawal:wght@400;500;700;800&display=swap" rel="stylesheet">
    <link rel="manifest" href="/manifest.webmanifest" />
    <link rel="icon" href="/images/logo-512.png" type="image/png" />
    <link rel="apple-touch-icon" href="/images/logo-512.png" />
    <script>
      tailwind.config = {
        theme: {
          extend: {
            fontFamily: {
              sans: ['Inter', '-apple-system', 'BlinkMacSystemFont', 'Segoe UI', 'Roboto', 'sans-serif'],
              arabic: ['Tajawal', 'sans-serif'],
            },
          }
        }
      }
    </script>
    <link rel="stylesheet" href="/index.css">
    <style>
      body { background-color: #eef2ff; color: #1D1D1F; -webkit-font-smoothing: antialiased; }
      @keyframes tenantPulse { 0%,100% { opacity: 0.6; } 50% { opacity: 1; } }
      @keyframes tenantSpin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }
      #tenant-splash.splash-exit { opacity:0!important; transform:scale(1.05)!important; pointer-events:none!important; }
    </style>
  </head>
  <body>
    <div id="root">
      <div id="tenant-splash" style="
        position:fixed;inset:0;z-index:99999;
        display:flex;flex-direction:column;align-items:center;justify-content:center;
        background:linear-gradient(160deg,#eef2ff 0%,#e0e7ff 30%,#ffffff 50%,#eef2ff 100%);
        font-family:'Inter',-apple-system,sans-serif;
        transition:opacity 0.6s ease,transform 0.6s ease;
      ">
        <div style="position:relative;width:80px;height:80px;margin-bottom:24px;">
          <div style="position:absolute;inset:0;border-radius:50%;border:3px solid rgba(79,70,229,0.1);border-top-color:#4f46e5;animation:tenantSpin 1s linear infinite;"></div>
          <div style="position:absolute;inset:8px;border-radius:50%;border:2px solid rgba(79,70,229,0.05);border-bottom-color:#6366f1;animation:tenantSpin 1.5s linear infinite reverse;"></div>
          <div style="position:absolute;inset:50%;transform:translate(-50%,-50%);width:28px;height:28px;">
            <img src="/images/logo-512.png" alt="" style="width:100%;height:100%;object-fit:contain;" />
          </div>
        </div>
        <p style="font-size:18px;font-weight:700;color:#4f46e5;margin:0;">Tenant Portal</p>
        <p style="font-size:12px;color:#6366f1;margin:8px 0 0;animation:tenantPulse 2s ease-in-out infinite;letter-spacing:1px;">بوابة المستأجر</p>
      </div>
    </div>
    <script>
      (function() {
        var done = false;
        function dismiss() {
          if (done) return; done = true;
          var s = document.getElementById('tenant-splash');
          if (s) { s.classList.add('splash-exit'); setTimeout(function(){ if(s.parentNode) s.parentNode.removeChild(s); }, 700); }
        }
        var obs = new MutationObserver(function() {
          var root = document.getElementById('root');
          if (!root) return;
          for (var i = 0; i < root.children.length; i++) {
            if (root.children[i].id !== 'tenant-splash') { dismiss(); obs.disconnect(); return; }
          }
        });
        obs.observe(document.getElementById('root'), { childList: true });
        setTimeout(function() { dismiss(); obs.disconnect(); }, 8000);
      })();
    </script>
    <script type="module" src="/tenant-main.tsx"></script>
  </body>
</html>
