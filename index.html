<style id="splash-styles">

    <script>
      // Gracefully dismiss splash screen once React app renders real content
      (function() {
        var splashDismissed = false;
        function dismissSplash() {
          if (splashDismissed) return;
          splashDismissed = true;
          var splash = document.getElementById('splash-screen');
          if (splash) {
            splash.classList.add('splash-exit');
            setTimeout(function() {
              if (splash.parentNode) splash.parentNode.removeChild(splash);
              // Clean up the splash styles from head
              var ss = document.getElementById('splash-styles');
              if (ss) ss.parentNode.removeChild(ss);
            }, 900);
          }
        }
        // Watch for React content (not the splash itself)
        var observer = new MutationObserver(function() {
          var root = document.getElementById('root');
          if (!root) return;
          var children = root.children;
          for (var i = 0; i < children.length; i++) {
            // React renders a div/section/main that is NOT the splash screen
            if (children[i].id !== 'splash-screen') {
              dismissSplash();
              observer.disconnect();
              return;
            }
          }
        });
        observer.observe(document.getElementById('root'), { childList: true, subtree: false });
        // Fallback: remove splash after 10 seconds max
        setTimeout(function() { dismissSplash(); observer.disconnect(); }, 10000);
      })();
    </script>
