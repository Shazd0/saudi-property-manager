<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="theme-color" content="#ffffff" />
    <meta name="apple-mobile-web-app-status-bar-style" content="default" />
    <title>Amlak Owner Portal - بوابة المالك</title>
    <script>
      const _origWarn = console.warn;
      console.warn = function(...args) {
        if (args[0] && typeof args[0] === 'string' && args[0].includes('cdn.tailwindcss.com')) return;
        _origWarn.apply(console, args);
      };
    </script>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800;900&family=Tajawal:wght@400;500;700;800&display=swap" rel="stylesheet">
    <link rel="manifest" href="/manifest.webmanifest" />
    <link rel="icon" href="/images/logo-512.png" type="image/png" />
    <link rel="apple-touch-icon" href="/images/logo-512.png" />
    <script>
      tailwind.config = {
        theme: {
          extend: {
            fontFamily: {
              sans: ['Inter', '-apple-system', 'BlinkMacSystemFont', 'Segoe UI', 'Roboto', 'sans-serif'],
              arabic: ['Tajawal', 'sans-serif'],
            },
          }
        }
      }
    </script>
    <link rel="stylesheet" href="/index.css">
    <style>
      html { scroll-behavior: smooth; -webkit-overflow-scrolling: touch; }
      body { background-color: #f8fafc; color: #1e293b; -webkit-font-smoothing: antialiased; -moz-osx-font-smoothing: grayscale; }
      * { -webkit-tap-highlight-color: transparent; }
      input, select, textarea { font-size: 16px !important; } /* Prevent iOS zoom */
      @keyframes ownerFloat { 0%,100% { transform: translateY(0px); } 50% { transform: translateY(-6px); } }
      @keyframes ownerGlow { 0%,100% { box-shadow: 0 8px 30px rgba(30,64,175,0.1); } 50% { box-shadow: 0 12px 50px rgba(30,64,175,0.2); } }
      @keyframes ownerSpin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }
      @keyframes ownerShimmer { 0% { background-position: -200% center; } 100% { background-position: 200% center; } }
      @keyframes ownerFadeUp { 0% { opacity:0; transform:translateY(20px); } 100% { opacity:1; transform:translateY(0); } }
      @keyframes ownerPulse { 0%,100% { opacity:0.4; } 50% { opacity:1; } }
      #owner-splash.splash-exit { opacity:0!important; transform:scale(1.02)!important; pointer-events:none!important; }
    </style>
  </head>
  <body>
    <div id="root">
      <div id="owner-splash" style="
        position:fixed;inset:0;z-index:99999;
        display:flex;flex-direction:column;align-items:center;justify-content:center;
        background:#f8fafc;
        font-family:'Inter',-apple-system,sans-serif;
        transition:opacity 0.6s ease,transform 0.6s ease;
        overflow:hidden;
      ">
        <!-- Soft gradient orbs -->
        <div style="position:absolute;top:-20%;left:-10%;width:50vw;height:50vw;border-radius:50%;background:radial-gradient(circle,rgba(30,64,175,0.04) 0%,transparent 70%);"></div>
        <div style="position:absolute;bottom:-20%;right:-10%;width:40vw;height:40vw;border-radius:50%;background:radial-gradient(circle,rgba(99,102,241,0.03) 0%,transparent 70%);"></div>
        
        <!-- Main content -->
        <div style="animation:ownerFloat 3s ease-in-out infinite;position:relative;">
          <div style="width:90px;height:90px;position:relative;animation:ownerGlow 2.5s ease-in-out infinite;">
            <div style="position:absolute;inset:0;border-radius:24px;border:2px solid rgba(30,64,175,0.08);border-top-color:rgba(30,64,175,0.6);animation:ownerSpin 1.2s linear infinite;"></div>
            <div style="position:absolute;inset:6px;border-radius:20px;border:1.5px solid rgba(30,64,175,0.04);border-bottom-color:rgba(99,102,241,0.4);animation:ownerSpin 2s linear infinite reverse;"></div>
            <div style="position:absolute;inset:12px;border-radius:16px;background:white;box-shadow:0 4px 20px rgba(0,0,0,0.06);display:flex;align-items:center;justify-content:center;">
              <img src="/images/logo-512.png" alt="" style="width:32px;height:32px;object-fit:contain;" />
            </div>
          </div>
        </div>
        
        <!-- Text -->
        <div style="margin-top:28px;text-align:center;animation:ownerFadeUp 0.8s ease-out 0.3s both;">
          <p style="font-size:12px;font-weight:800;letter-spacing:5px;text-transform:uppercase;color:#1e40af;margin:0;">
            OWNER PORTAL
          </p>
          <p style="font-size:11px;color:#94a3b8;margin:8px 0 0;font-weight:500;letter-spacing:1px;font-family:'Tajawal',sans-serif;">بوابة المالك</p>
        </div>
        
        <!-- Loading dots -->
        <div style="margin-top:24px;display:flex;gap:6px;animation:ownerFadeUp 0.8s ease-out 0.6s both;">
          <div style="width:5px;height:5px;border-radius:50%;background:#1e40af;animation:ownerPulse 1.4s ease-in-out infinite;"></div>
          <div style="width:5px;height:5px;border-radius:50%;background:#3b82f6;animation:ownerPulse 1.4s ease-in-out 0.2s infinite;"></div>
          <div style="width:5px;height:5px;border-radius:50%;background:#60a5fa;animation:ownerPulse 1.4s ease-in-out 0.4s infinite;"></div>
        </div>
      </div>
    </div>
    <script>
      (function() {
        var done = false;
        function dismiss() {
          if (done) return; done = true;
          var s = document.getElementById('owner-splash');
          if (s) { s.classList.add('splash-exit'); setTimeout(function(){ if(s.parentNode) s.parentNode.removeChild(s); }, 900); }
        }
        var obs = new MutationObserver(function() {
          var root = document.getElementById('root');
          if (!root) return;
          for (var i = 0; i < root.children.length; i++) {
            if (root.children[i].id !== 'owner-splash') { dismiss(); obs.disconnect(); return; }
          }
        });
        obs.observe(document.getElementById('root'), { childList: true });
        setTimeout(function() { dismiss(); obs.disconnect(); }, 8000);
      })();
    </script>
    <script type="module" src="/owner-main.tsx"></script>
  </body>
</html>
