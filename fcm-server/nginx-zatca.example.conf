# Copy to /etc/nginx/sites-available/zatca-api (Linux) or include from your main nginx.conf.
# Replace zatca-api.yourdomain.com and SSL paths. Point DNS A/AAAA to this VPS.
#
# Upstream: Docker publishes ZATCA on 127.0.0.1:3002 (see docker-compose.yml ports).

upstream zatca_upstream {
    server 127.0.0.1:3002;
    keepalive 8;
}

server {
    listen 80;
    listen [::]:80;
    server_name zatca-api.yourdomain.com;

    # After certbot: redirect HTTP → HTTPS (uncomment when TLS is ready)
    # return 301 https://$host$request_uri;

    # Temporary: proxy straight to API (use only behind firewall or for testing)
    location / {
        proxy_pass http://zatca_upstream;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_connect_timeout 60s;
        proxy_send_timeout 60s;
        proxy_read_timeout 60s;
    }
}

